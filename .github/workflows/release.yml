name: Release

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Aftman
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            "https://github.com/LPGhatguy/aftman/releases/download/v0.3.0/aftman-0.3.0-linux-x86_64.zip" \
            -o aftman.zip
          unzip -q aftman.zip
          ./aftman self-install
          echo "$HOME/.aftman/bin" >> "$GITHUB_PATH"

      - name: Install tools (Rojo)
        run: aftman install

      - name: Build model
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          rojo build model.project.json --output "aegis-${SHORT_SHA}.rbxm"
          echo "ASSET_NAME=aegis-${SHORT_SHA}.rbxm" >> "$GITHUB_ENV"

      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.ASSET_NAME }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Roblox model
        env:
          ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}
        run: |
          # Fetch CSRF token - Roblox returns it in the response headers on a
          # rejected POST. We intentionally ignore the 403 body.
          CSRF_TOKEN=$(curl -s -o /dev/null -D - \
            -X POST "https://auth.roblox.com/v2/logout" \
            -H "Cookie: .ROBLOSECURITY=${ROBLOSECURITY}" \
            | grep -i "^x-csrf-token:" | awk '{print $2}' | tr -d '\r\n')

          if [ -z "$CSRF_TOKEN" ]; then
            echo "Failed to fetch CSRF token - check ROBLOSECURITY secret"
            exit 1
          fi

          # Upload new version of the model to Roblox
          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            "https://data.roblox.com/ide/publish/uploadnewversion?assetid=115970020351857&type=Model&name=Aegis&groupId=34832828" \
            -H "Cookie: .ROBLOSECURITY=${ROBLOSECURITY}" \
            -H "X-CSRF-TOKEN: ${CSRF_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${{ env.ASSET_NAME }}")

          echo "Roblox upload HTTP status: ${HTTP_STATUS}"
          cat response.txt

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Roblox upload failed with status ${HTTP_STATUS}"
            exit 1
          fi
