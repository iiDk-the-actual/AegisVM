name: Release

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: ok-nick/setup-aftman@v0.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build model
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          rojo build model.project.json --output "aegis-${SHORT_SHA}.rbxm"
          echo "ASSET_NAME=aegis-${SHORT_SHA}.rbxm" >> "$GITHUB_ENV"

      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name }}" "$ASSET_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Roblox
        run: |
          curl --location --request PATCH \
            'https://apis.roblox.com/assets/v1/assets/115970020351857' \
            --header 'x-api-key: ${{ secrets.ROBLOX_API_KEY }}' \
            --form 'request={"assetType":"Model","assetId":"115970020351857"}' \
            --form "fileContent=@${ASSET_NAME};type=model/x-rbxm"
